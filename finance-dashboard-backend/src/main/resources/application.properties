# JWT Configuration
# Make sure this secret is long (at least 32 characters)
app.jwt.secret=myFinancialDashboardSecretKeyCheck1234567890
app.jwt.expiration=86400000

# H2 Database Configuration (In-Memory for testing)
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.jwt.secret=MyFinanceDashboardUltraSecretKey1234567890
app.jwt.expiration=86400000